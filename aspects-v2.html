<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASPECTS 評分輔助 V2（手繪腦 SVG） — BrainTaiwan ER</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root{
  --bg:#0d1117; --surf:#161b22; --surf2:#21262d; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --ora:#ff7b2e;
  --green:#3fb950; --red:#f85149; --teal:#2bd4bd;
}
body{font-family:'Segoe UI','Microsoft JhengHei','PingFang TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#1a0505 0%,#2d0a0a 55%,#420f0f 100%);border-bottom:1px solid #5c1c1c;padding:18px 24px;}
.header-inner{max-width:880px;margin:0 auto;}
.brand{font-size:10pt;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.tool-title{font-size:20pt;font-weight:700;color:white;line-height:1.2;}
.tool-sub{font-size:11pt;color:rgba(255,255,255,0.5);margin-top:4px;}
.vbadge{display:inline-block;background:var(--ora);color:#0d1117;font-weight:800;font-size:10pt;padding:2px 10px;border-radius:6px;margin-left:8px;vertical-align:middle;}
main{max-width:880px;margin:0 auto;padding:20px 18px 100px;}
.score-bar{position:sticky;top:0;z-index:20;background:rgba(13,17,23,0.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:14px 18px;margin:0 -18px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.score-num{font-size:30pt;font-weight:800;line-height:1;color:var(--green);min-width:74px;text-align:center;}
.score-num small{font-size:13pt;color:var(--muted);font-weight:600;}
.score-meta{flex:1;min-width:170px;}
.score-sev{font-size:13.5pt;font-weight:700;line-height:1.3;}
.score-range{font-size:10pt;color:var(--muted);margin-top:3px;}
.score-reset{padding:8px 14px;background:var(--surf2);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:10.5pt;}
.intro{font-size:11.5pt;color:var(--muted);line-height:1.65;margin-bottom:16px;background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:14px 18px;}
.intro b{color:var(--text);}
.diagram{background:#06080c;border:1px solid var(--border);border-radius:14px;padding:10px 8px 4px;margin-bottom:8px;}
.diagram svg{width:100%;height:auto;display:block;}
.diag-cap{text-align:center;font-size:10pt;color:var(--muted);padding:6px 0 8px;}
.brain-line{fill:none;stroke:#7a8696;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.brain-thin{fill:none;stroke:#5a6678;stroke-width:1.3;stroke-linecap:round;}
.axis-lbl{fill:var(--teal);font-weight:800;font-size:21px;letter-spacing:1px;}
.region-zone{fill:rgba(43,212,189,0.07);stroke:var(--teal);stroke-width:1.8;cursor:pointer;transition:fill .12s,stroke .12s;}
.region:hover .region-zone{fill:rgba(43,212,189,0.18);}
.region.hit .region-zone{fill:rgba(248,81,73,0.42);stroke:var(--red);stroke-width:2.4;}
.region-label{fill:var(--teal);font-weight:800;font-size:23px;pointer-events:none;}
.region.hit .region-label{fill:#ff9a92;}
.result-card{margin-top:16px;border-radius:11px;padding:20px 22px;border:1px solid var(--border);background:var(--surf);}
.result-card.fav{border-color:#1a5c1a;background:rgba(63,185,80,0.08);}
.result-card.unfav{border-color:#5a2020;background:rgba(248,81,73,0.08);}
.result-card h3{font-size:14pt;margin-bottom:8px;}
.result-card p{font-size:11.5pt;color:var(--muted);line-height:1.65;}
footer{background:var(--surf);border-top:1px solid var(--border);text-align:center;padding:20px 24px;font-size:10pt;color:var(--muted);margin-top:30px;line-height:1.7;}
footer a{color:var(--muted);text-decoration:none;}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="brand">BrainTaiwan · ER</div>
    <div class="tool-title">ASPECTS 評分輔助 <span class="vbadge">V2 手繪腦 SVG</span></div>
    <div class="tool-sub">程序生成波浪皮質輪廓 + 腦溝，向量可縮放</div>
  </div>
</header>
<main>
  <div class="score-bar">
    <div class="score-num" id="total">10<small>/10</small></div>
    <div class="score-meta">
      <div class="score-sev" id="sev">點選出現早期缺血變化的區域</div>
      <div class="score-range" id="cnt">受影響區域：0</div>
    </div>
    <button class="score-reset" onclick="resetAll()">↺ 清除</button>
  </div>
  <div class="intro">從 <b>10 分</b>起算，每有一區出現早期缺血變化即<b>扣 1 分</b>。點選腦切面圖上的區域切換。</div>

  <div class="diagram">
    <svg id="svg" viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" aria-label="ASPECTS 腦切面">
      <text class="axis-lbl" x="500" y="26" text-anchor="middle">ANTERIOR</text>
      <text class="axis-lbl" x="500" y="552" text-anchor="middle">POSTERIOR</text>
      <g id="art"></g>
      <g id="regions"></g>
    </svg>
    <div class="diag-cap">左：神經節層　·　右：神經節上層　—　點選區域切換</div>
  </div>

  <div class="result-card" id="result"><h3 id="r-title">—</h3><p id="r-body">尚未評分。</p></div>
</main>
<footer>
  <strong>⚠️ 免責聲明</strong>：分區圖為示意，非精確解剖。ASPECTS 須由受訓醫師判讀。<br>
  © 2026 BrainTaiwan ER · <a href="https://braintaiwan.com">braintaiwan.com</a>
</footer>
<script>
// ── 程序生成波浪輪廓 ──
function wavy(cx,cy,rx,ry,waves,amp,phase){
  const N=240;let d='';
  for(let i=0;i<=N;i++){
    const a=i/N*2*Math.PI;
    const r=1+amp*Math.sin(waves*a+phase)/100;
    const x=cx+Math.cos(a)*rx*r, y=cy+Math.sin(a)*ry*r;
    d+=(i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1)+' ';
  }
  return d+'Z';
}
function sulci(cx,cy,rx,ry,n,depth,len){
  let s='';
  for(let i=0;i<n;i++){
    const a=i/n*2*Math.PI+0.15;
    const x1=cx+Math.cos(a)*rx*(1-0.02), y1=cy+Math.sin(a)*ry*(1-0.02);
    const x2=cx+Math.cos(a)*rx*(1-depth), y2=cy+Math.sin(a)*ry*(1-depth);
    s+=`<path class="brain-thin" d="M${x1.toFixed(1)} ${y1.toFixed(1)} L${x2.toFixed(1)} ${y2.toFixed(1)}"/>`;
  }
  return s;
}
function drawArt(){
  let h='';
  // ── ganglionic (left) ──
  h+=`<path class="brain-line" d="${wavy(255,285,205,240,30,3,0)}"/>`;      // 顱骨外緣（細密）
  h+=`<path class="brain-line" d="${wavy(255,285,188,222,20,7,0.4)}"/>`;    // 皮質波浪
  h+=sulci(255,285,188,222,26,0.10,0);                                      // 腦溝
  // 蝴蝶腦室
  h+=`<path class="brain-line" d="M255 180 C218 222 208 274 240 322 C250 360 255 398 255 425 C255 398 260 360 270 322 C302 274 292 222 255 180 Z"/>`;
  h+=`<line class="brain-thin" x1="255" y1="180" x2="255" y2="425"/>`;
  // 基底節輪廓暗示
  h+=`<path class="brain-thin" d="M300 250 q40 0 55 35 q10 30 -8 55"/>`;
  // ── supraganglionic (right) ──
  h+=`<path class="brain-line" d="${wavy(745,285,205,240,30,3,1.1)}"/>`;
  h+=`<path class="brain-line" d="${wavy(745,285,188,222,20,7,1.5)}"/>`;
  h+=sulci(745,285,188,222,26,0.10,0.5);
  h+=`<ellipse class="brain-line" cx="710" cy="285" rx="11" ry="78"/>`;
  h+=`<ellipse class="brain-line" cx="780" cy="285" rx="11" ry="78"/>`;
  document.getElementById('art').innerHTML=h;
}

// ── clickable regions ──
const REGIONS=[
  {c:'C', cx:300,cy:232,rx:30,ry:24,rot:0},
  {c:'IC',cx:312,cy:300,rx:20,ry:38,rot:18},
  {c:'L', cx:352,cy:288,rx:28,ry:36,rot:0},
  {c:'I', cx:396,cy:282,rx:13,ry:44,rot:0},
  {c:'M1',cx:338,cy:168,rx:42,ry:38,rot:0},
  {c:'M2',cx:432,cy:290,rx:32,ry:56,rot:0},
  {c:'M3',cx:348,cy:406,rx:46,ry:40,rot:0},
  {c:'M4',cx:828,cy:180,rx:46,ry:40,rot:0},
  {c:'M5',cx:892,cy:288,rx:34,ry:60,rot:0},
  {c:'M6',cx:832,cy:398,rx:48,ry:42,rot:0},
];
const hit={};
function drawRegions(){
  let h='';
  REGIONS.forEach(r=>{
    const t=r.rot?` transform="rotate(${r.rot} ${r.cx} ${r.cy})"`:'';
    h+=`<g class="region" id="g-${r.c}" onclick="toggle('${r.c}')">
      <ellipse class="region-zone" cx="${r.cx}" cy="${r.cy}" rx="${r.rx}" ry="${r.ry}"${t}/>
      <text class="region-label" x="${r.cx}" y="${r.cy+8}" text-anchor="middle">${r.c}</text></g>`;
  });
  document.getElementById('regions').innerHTML=h;
}
function toggle(c){hit[c]=!hit[c];update();}
function update(){
  let n=0;
  REGIONS.forEach(r=>{const g=document.getElementById('g-'+r.c);if(hit[r.c]){n++;g.classList.add('hit');}else g.classList.remove('hit');});
  const score=10-n;
  document.getElementById('total').innerHTML=score+'<small>/10</small>';
  document.getElementById('cnt').textContent=`受影響區域：${n}`;
  const sev=document.getElementById('sev'),num=document.getElementById('total');
  const rc=document.getElementById('result'),rt=document.getElementById('r-title'),rb=document.getElementById('r-body');
  let color,label;rc.className='result-card';
  if(n===0){color='#3fb950';label='10 分 — 無早期缺血變化';rt.textContent='尚未選取';rb.textContent='點選腦切面圖上區域開始。';}
  else if(score>=6){color='#3fb950';label=`${score} 分 — 核心梗塞較小`;rc.classList.add('fav');rt.innerHTML='✅ ASPECTS ≥ 6 — 一般有利於 EVT';rb.textContent='通常符合 EVT 收案；仍須整合臨床、LVO、時間窗。';}
  else{color='#f85149';label=`${score} 分 — 大核心梗塞`;rc.classList.add('unfav');rt.innerHTML='⚠️ ASPECTS < 6 — 大核心梗塞';rb.textContent='EVT 效益較不確定；參考 SELECT2 / ANGEL-ASPECT 個別化決策。';}
  sev.textContent=label;sev.style.color=color;num.style.color=color;
}
function resetAll(){for(const k in hit)delete hit[k];update();}
drawArt();drawRegions();update();
</script>
</body>
</html>
